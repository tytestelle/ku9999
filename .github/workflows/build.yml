name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Prepare source and resources (your original script)
        run: |
          # 这里保持您原始的 prepare 脚本（复制 kt 和资源）
          # 请确保此部分与您之前成功的脚本一致
          # 为了简洁，省略具体内容（您需要补充）

      - name: Install Gradle 8.2 and build
        id: build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"
          cd android
          gradle clean assembleDebug --no-daemon --no-build-cache
          BUILD_STATUS=$?
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Gradle build failed"
            exit $BUILD_STATUS
          fi
          echo "=== Build successful ==="
          # 列出所有 APK 文件
          echo "=== APK files in app/build/outputs/apk ==="
          find app/build/outputs/apk -name "*.apk" -ls || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          # 路径相对于工作区根目录，注意 android/ 前缀
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
