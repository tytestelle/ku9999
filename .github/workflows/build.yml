name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Verify source files exist
        run: |
          echo "=== Checking key files ==="
          [ -f MainActivity.kt ] && echo "MainActivity.kt found" || echo "MainActivity.kt missing"
          [ -f activity_main.xml ] && echo "activity_main.xml found" || echo "activity_main.xml missing"
          [ -f AndroidManifest.xml ] && echo "AndroidManifest.xml found" || echo "AndroidManifest.xml missing"
          ls -la

      - name: Build APK
        run: |
          cd android
          gradle clean assembleDebug --stacktrace --info --no-daemon

      - name: List build outputs
        run: |
          echo "=== Searching for APK ==="
          find android -name "*.apk" -type f || echo "No APK found"
          echo "=== Debug output directory ==="
          ls -la android/app/build/outputs/apk/debug/ || echo "Directory not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
