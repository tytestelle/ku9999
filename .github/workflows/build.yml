name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Copy all Kotlin files and generate missing resources
        run: |
          echo "🚀 开始修复项目结构..."

          # 1. 创建目标包目录
          mkdir -p android/app/src/main/java/com/ku9/player

          # 2. 将仓库根目录所有 .kt 文件（排除 android/ 目录）复制到目标包
          echo "📦 复制 Kotlin 文件..."
          find . -maxdepth 3 -name "*.kt" ! -path "./android/*" -exec cp -v {} android/app/src/main/java/com/ku9/player/ \;
          # 也复制子目录中的 .kt（如 data/, parser/ 等）
          find . -name "*.kt" ! -path "./android/*" -exec cp -v {} android/app/src/main/java/com/ku9/player/ \;

          # 3. 生成所有缺失的资源文件（布局、菜单、values）
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/menu

          # 使用 base64 解码写入布局文件，避免 heredoc 编码问题
          echo '' | base64 -d > android/app/src/main/res/layout/activity_main.xml

          echo '' | base64 -d > android/app/src/main/res/layout/fragment_channel_list.xml

          echo '' | base64 -d > android/app/src/main/res/layout/item_channel.xml

          echo '' | base64 -d > android/app/src/main/res/menu/bottom_nav_menu.xml

          # 生成 values 资源（themes, attrs, strings, colors）
          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHlsZSBuYW1lPSJUaGVtZS5LVTlQbGF5ZXIiIHBhcmVudD0iVGhlbWUuQXBwQ29tcGF0LkxpZ2h0LkRhcmtBY3Rpb25CYXIiIC8+CjwvcmVzb3VyY2VzPgo=' | base64 -d > android/app/src/main/res/values/themes.xml

          echo '' | base64 -d > android/app/src/main/res/values/attrs.xml

          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPktVOSBQbGF5ZXI8L3N0cmluZz4KPC9yZXNvdXJjZXM+Cg==' | base64 -d > android/app/src/main/res/values/strings.xml

          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxjb2xvciBuYW1lPSJjb2xvclByaW1hcnkiPiMzRjUxQjU8L2NvbG9yPgogICAgPGNvbG9yIG5hbWU9ImNvbG9yUHJpbWFyeURhcmsiPiMzMDNGOEY8L2NvbG9yPgogICAgPGNvbG9yIG5hbWU9ImNvbG9yQWNjZW50Ij4jRkY0MDgxPC9jb2xvcj4KPC9yZXNvdXJjZXM+Cg==' | base64 -d > android/app/src/main/res/values/colors.xml

          # 修复 AndroidManifest.xml
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/ package="com\.ku9\.player"//' "$MANIFEST"
            sed -i 's/ android:icon="@mipmap\/[^"]*"//g' "$MANIFEST"
            sed -i 's/ android:roundIcon="@mipmap\/[^"]*"//g' "$MANIFEST"
          fi

          # 生成 gradle.properties
          cat > android/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          echo "✅ 所有文件已就绪。"
          # 列出目标目录的内容以便验证
          echo "📁 目标包目录内容："
          ls -la android/app/src/main/java/com/ku9/player/

      - name: Build APK with Gradle
        id: build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"

          cd android
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache 2>&1 | tee build.log
          BUILD_STATUS=$?
          cp build.log ../build.log

          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Gradle build failed with exit code $BUILD_STATUS"
            exit $BUILD_STATUS
          fi

          echo "✅ Build successful"
          cd ..
          mkdir -p apk_output
          find android -name "*.apk" -type f -exec cp {} apk_output/ \;
          APK_COUNT=$(ls -1 apk_output/*.apk 2>/dev/null | wc -l)
          echo "📦 Found $APK_COUNT APK file(s)"
          if [ $APK_COUNT -eq 0 ]; then
            echo "❌ No APK generated"
            exit 1
          fi
          ls -la apk_output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: apk_output/*.apk
          if-no-files-found: error

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
