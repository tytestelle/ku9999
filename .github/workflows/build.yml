name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      # 可选：缓存 Gradle 依赖，加速构建
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prepare source and resources
        run: |
          # 清理并创建标准目录（包含完整包路径）
          rm -rf android/app/src/main/java
          rm -rf android/app/src/main/res
          
          mkdir -p android/app/src/main/java/com/ku9/player
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          # 复制所有 Kotlin 文件到包目录（扁平化，所有类在同一包下）
          echo "=== Copying Kotlin files ==="
          find . -maxdepth 2 -name "*.kt" ! -path "./android/*" -exec cp {} android/app/src/main/java/com/ku9/player/ \;
          for dir in data parser player ui utils; do
            if [ -d "$dir" ]; then
              cp $dir/*.kt android/app/src/main/java/com/ku9/player/ 2>/dev/null || true
            fi
          done

          # 复制布局文件
          echo "=== Copying layout files ==="
          for layout in activity_main.xml item_channel.xml item_group.xml; do
            if [ -f "$layout" ]; then
              cp "$layout" android/app/src/main/res/layout/
            fi
          done

          # 创建资源文件
          echo "=== Creating resource files ==="
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#3F51B5</color>
              <color name="colorPrimaryDark">#303F9F</color>
              <color name="colorAccent">#FF4081</color>
          </resources>
          EOF

          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">KU9 Player</string>
          </resources>
          EOF

          cat > android/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.KU9Player" parent="Theme.AppCompat.Light.DarkActionBar" />
          </resources>
          EOF

          # 创建 AndroidManifest.xml
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.ku9.player">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.KU9Player"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 创建空白的 ic_launcher 占位
          echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\" />" > android/app/src/main/res/mipmap-hdpi/ic_launcher.xml
          echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\" />" > android/app/src/main/res/mipmap-mdpi/ic_launcher.xml
          echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\" />" > android/app/src/main/res/mipmap-xhdpi/ic_launcher.xml
          echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\" />" > android/app/src/main/res/mipmap-xxhdpi/ic_launcher.xml
          echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\" />" > android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.xml

          # 验证文件
          echo "=== Files in android/app/src/main/java/com/ku9/player/ ==="
          ls -la android/app/src/main/java/com/ku9/player/

      - name: Install Gradle 8.2 and build
        id: build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"
          cd android
          # 使用 --stacktrace 和 --info 输出详细日志，方便调试
          gradle clean assembleDebug --stacktrace --info --no-daemon --no-build-cache 2>&1 | tee build.log
          BUILD_STATUS=$?
          # 打印完整构建日志（Action 界面可查看所有输出）
          echo "=== Full build log ==="
          cat build.log
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Gradle build failed with exit code $BUILD_STATUS"
            exit $BUILD_STATUS
          fi
          # 使用 find 搜索所有 APK，避免通配符陷阱
          echo "=== Searching for APK files ==="
          APK_COUNT=$(find app/build -type f -name "*.apk" | wc -l)
          echo "Found $APK_COUNT APK(s):"
          find app/build -type f -name "*.apk" -ls
          if [ $APK_COUNT -eq 0 ]; then
            echo "No APK generated! Listing app/build contents:"
            find app/build -type f 2>/dev/null || echo "build directory not found"
            exit 1
          fi
          # 记录 APK 所在目录（可选）
          echo "apk_dir=app/build/outputs/apk" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()   # 即使构建失败也尝试上传（如果有）
        with:
          name: app-debug
          # 使用通配符匹配所有 APK（路径相对于工作区根目录）
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error   # 若没有 APK 则明确失败
