name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prepare project (copy Kotlin files and generate resources)
        run: |
          set -e
          echo "🚀 开始准备项目..."

          # 创建目标包目录
          mkdir -p android/app/src/main/java/com/ku9/player

          # 复制所有 Kotlin 文件（包括子目录）
          echo "📦 复制 Kotlin 文件到目标包..."
          find . -name "*.kt" ! -path "./android/*" -exec cp -v {} android/app/src/main/java/com/ku9/player/ \;

          # 列出目标目录内容
          echo "📁 目标包中的 Kotlin 文件："
          ls -la android/app/src/main/java/com/ku9/player/

          # 生成资源文件（使用 echo 避免 heredoc 问题）
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/menu

          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/layout/activity_main.xml
          echo '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"' >> android/app/src/main/res/layout/activity_main.xml
          echo '    xmlns:app="http://schemas.android.com/apk/res-auto"' >> android/app/src/main/res/layout/activity_main.xml
          echo '    android:layout_width="match_parent"' >> android/app/src/main/res/layout/activity_main.xml
          echo '    android:layout_height="match_parent"' >> android/app/src/main/res/layout/activity_main.xml
          echo '    android:orientation="vertical">' >> android/app/src/main/res/layout/activity_main.xml
          echo '    <FrameLayout' >> android/app/src/main/res/layout/activity_main.xml
          echo '        android:id="@+id/fragment_container"' >> android/app/src/main/res/layout/activity_main.xml
          echo '        android:layout_width="match_parent"' >> android/app/src/main/res/layout/activity_main.xml
          echo '        android:layout_height="0dp"' >> android/app/src/main/res/layout/activity_main.xml
          echo '        android:layout_weight="1" />' >> android/app/src/main/res/layout/activity_main.xml
          echo '    <com.google.android.material.bottomnavigation.BottomNavigationView' >> android/app/src/main/res/layout/activity_main.xml
          echo '        android:id="@+id/bottom_navigation"' >> android/app/src/main/res/layout/activity_main.xml
          echo '        android:layout_width="match_parent"' >> android/app/src/main/res/layout/activity_main.xml
          echo '        android:layout_height="wrap_content"' >> android/app/src/main/res/layout/activity_main.xml
          echo '        app:menu="@menu/bottom_nav_menu" />' >> android/app/src/main/res/layout/activity_main.xml
          echo '</LinearLayout>' >> android/app/src/main/res/layout/activity_main.xml

          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/layout/fragment_channel_list.xml
          echo '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '    android:layout_width="match_parent"' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '    android:layout_height="match_parent"' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '    android:orientation="vertical">' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '    <Spinner' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '        android:id="@+id/spinner_groups"' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '        android:layout_width="match_parent"' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '        android:layout_height="wrap_content" />' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '    <androidx.appcompat.widget.SearchView' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '        android:id="@+id/search_view"' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '        android:layout_width="match_parent"' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '        android:layout_height="wrap_content"' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '        android:queryHint="搜索频道" />' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '    <androidx.recyclerview.widget.RecyclerView' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '        android:id="@+id/rv_channels"' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '        android:layout_width="match_parent"' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '        android:layout_height="match_parent" />' >> android/app/src/main/res/layout/fragment_channel_list.xml
          echo '</LinearLayout>' >> android/app/src/main/res/layout/fragment_channel_list.xml

          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/layout/item_channel.xml
          echo '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"' >> android/app/src/main/res/layout/item_channel.xml
          echo '    android:layout_width="match_parent"' >> android/app/src/main/res/layout/item_channel.xml
          echo '    android:layout_height="wrap_content"' >> android/app/src/main/res/layout/item_channel.xml
          echo '    android:padding="12dp"' >> android/app/src/main/res/layout/item_channel.xml
          echo '    android:orientation="horizontal">' >> android/app/src/main/res/layout/item_channel.xml
          echo '    <ImageView' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:id="@+id/ivLogo"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:layout_width="40dp"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:layout_height="40dp"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:scaleType="centerCrop" />' >> android/app/src/main/res/layout/item_channel.xml
          echo '    <TextView' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:id="@+id/tvChannelName"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:layout_width="0dp"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:layout_height="wrap_content"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:layout_weight="1"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:layout_marginStart="12dp"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:textSize="16sp" />' >> android/app/src/main/res/layout/item_channel.xml
          echo '    <ImageView' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:id="@+id/ivFavorite"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:layout_width="24dp"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:layout_height="24dp"' >> android/app/src/main/res/layout/item_channel.xml
          echo '        android:src="@android:drawable/star_off" />' >> android/app/src/main/res/layout/item_channel.xml
          echo '</LinearLayout>' >> android/app/src/main/res/layout/item_channel.xml

          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/layout/item_group.xml
          echo '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"' >> android/app/src/main/res/layout/item_group.xml
          echo '    android:layout_width="match_parent"' >> android/app/src/main/res/layout/item_group.xml
          echo '    android:layout_height="wrap_content"' >> android/app/src/main/res/layout/item_group.xml
          echo '    android:padding="12dp">' >> android/app/src/main/res/layout/item_group.xml
          echo '    <TextView' >> android/app/src/main/res/layout/item_group.xml
          echo '        android:id="@+id/tvGroupName"' >> android/app/src/main/res/layout/item_group.xml
          echo '        android:layout_width="match_parent"' >> android/app/src/main/res/layout/item_group.xml
          echo '        android:layout_height="wrap_content"' >> android/app/src/main/res/layout/item_group.xml
          echo '        android:textSize="16sp" />' >> android/app/src/main/res/layout/item_group.xml
          echo '</LinearLayout>' >> android/app/src/main/res/layout/item_group.xml

          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '<menu xmlns:android="http://schemas.android.com/apk/res/android">' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '    <item' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '        android:id="@+id/nav_channels"' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '        android:icon="@android:drawable/ic_menu_view"' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '        android:title="频道" />' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '    <item' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '        android:id="@+id/nav_epg"' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '        android:icon="@android:drawable/ic_menu_agenda"' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '        android:title="节目单" />' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '    <item' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '        android:id="@+id/nav_settings"' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '        android:icon="@android:drawable/ic_menu_preferences"' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '        android:title="设置" />' >> android/app/src/main/res/menu/bottom_nav_menu.xml
          echo '</menu>' >> android/app/src/main/res/menu/bottom_nav_menu.xml

          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/themes.xml
          echo '<resources>' >> android/app/src/main/res/values/themes.xml
          echo '    <style name="Theme.KU9Player" parent="Theme.AppCompat.Light.DarkActionBar" />' >> android/app/src/main/res/values/themes.xml
          echo '</resources>' >> android/app/src/main/res/values/themes.xml

          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/attrs.xml
          echo '<resources>' >> android/app/src/main/res/values/attrs.xml
          echo '    <attr name="use_controller" format="boolean" />' >> android/app/src/main/res/values/attrs.xml
          echo '    <attr name="controller" format="boolean" />' >> android/app/src/main/res/values/attrs.xml
          echo '    <attr name="player" format="reference" />' >> android/app/src/main/res/values/attrs.xml
          echo '    <attr name="surface_type" format="enum">' >> android/app/src/main/res/values/attrs.xml
          echo '        <enum name="surface_view" value="0" />' >> android/app/src/main/res/values/attrs.xml
          echo '        <enum name="texture_view" value="1" />' >> android/app/src/main/res/values/attrs.xml
          echo '        <enum name="spherical_view" value="2" />' >> android/app/src/main/res/values/attrs.xml
          echo '        <enum name="video_decoder_gl_surface_view" value="3" />' >> android/app/src/main/res/values/attrs.xml
          echo '    </attr>' >> android/app/src/main/res/values/attrs.xml
          echo '    <attr name="resize_mode" format="enum">' >> android/app/src/main/res/values/attrs.xml
          echo '        <enum name="fit" value="0" />' >> android/app/src/main/res/values/attrs.xml
          echo '        <enum name="fixed_width" value="1" />' >> android/app/src/main/res/values/attrs.xml
          echo '        <enum name="fixed_height" value="2" />' >> android/app/src/main/res/values/attrs.xml
          echo '        <enum name="fill" value="3" />' >> android/app/src/main/res/values/attrs.xml
          echo '        <enum name="zoom" value="4" />' >> android/app/src/main/res/values/attrs.xml
          echo '    </attr>' >> android/app/src/main/res/values/attrs.xml
          echo '</resources>' >> android/app/src/main/res/values/attrs.xml

          # 如果 strings.xml 不存在则生成
          if [ ! -f android/app/src/main/res/values/strings.xml ]; then
            echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/strings.xml
            echo '<resources>' >> android/app/src/main/res/values/strings.xml
            echo '    <string name="app_name">KU9 Player</string>' >> android/app/src/main/res/values/strings.xml
            echo '</resources>' >> android/app/src/main/res/values/strings.xml
          fi

          # 如果 colors.xml 不存在则生成
          if [ ! -f android/app/src/main/res/values/colors.xml ]; then
            echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/colors.xml
            echo '<resources>' >> android/app/src/main/res/values/colors.xml
            echo '    <color name="colorPrimary">#3F51B5</color>' >> android/app/src/main/res/values/colors.xml
            echo '    <color name="colorPrimaryDark">#303F9F</color>' >> android/app/src/main/res/values/colors.xml
            echo '    <color name="colorAccent">#FF4081</color>' >> android/app/src/main/res/values/colors.xml
            echo '</resources>' >> android/app/src/main/res/values/colors.xml
          fi

          # 修复 AndroidManifest.xml
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/ package="com\.ku9\.player"//' "$MANIFEST"
            sed -i 's/ android:icon="@mipmap\/[^"]*"//g' "$MANIFEST"
            sed -i 's/ android:roundIcon="@mipmap\/[^"]*"//g' "$MANIFEST"
          fi

          # 生成 gradle.properties
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> android/gradle.properties

          echo "✅ 项目准备完成。"

      - name: Build APK with Gradle
        id: build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"

          cd android
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache 2>&1 | tee build.log
          BUILD_STATUS=$?
          cp build.log ../build.log

          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Gradle build failed with exit code $BUILD_STATUS"
            exit $BUILD_STATUS
          fi

          echo "✅ Build successful"
          cd ..
          mkdir -p apk_output
          find android -name "*.apk" -type f -exec cp {} apk_output/ \;
          APK_COUNT=$(ls -1 apk_output/*.apk 2>/dev/null | wc -l)
          echo "📦 Found $APK_COUNT APK file(s)"
          if [ $APK_COUNT -eq 0 ]; then
            echo "❌ No APK generated"
            exit 1
          fi
          ls -la apk_output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: apk_output/*.apk
          if-no-files-found: error

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
