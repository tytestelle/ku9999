name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prepare source, resources and Gradle scripts
        run: |
          # ------------------- 清理并创建目录 -------------------
          rm -rf android/app/src/main/java
          rm -rf android/app/src/main/res
          
          mkdir -p android/app/src/main/java/com/ku9/player
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          # ------------------- 复制 Kotlin 源文件 -------------------
          echo "=== Copying Kotlin files ==="
          find . -maxdepth 2 -name "*.kt" ! -path "./android/*" -exec cp {} android/app/src/main/java/com/ku9/player/ \;
          for dir in data parser player ui utils; do
            if [ -d "$dir" ]; then
              cp $dir/*.kt android/app/src/main/java/com/ku9/player/ 2>/dev/null || true
            fi
          done

          # ------------------- 复制布局文件 -------------------
          echo "=== Copying layout files ==="
          for layout in activity_main.xml item_channel.xml item_group.xml; do
            if [ -f "$layout" ]; then
              cp "$layout" android/app/src/main/res/layout/
            fi
          done

          # ------------------- 创建资源文件 -------------------
          echo "=== Creating resource files ==="
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#3F51B5</color>
              <color name="colorPrimaryDark">#303F9F</color>
              <color name="colorAccent">#FF4081</color>
          </resources>
          EOF

          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">KU9 Player</string>
          </resources>
          EOF

          cat > android/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.KU9Player" parent="Theme.AppCompat.Light.DarkActionBar" />
          </resources>
          EOF

          # ------------------- 创建 AndroidManifest.xml -------------------
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.ku9.player">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.KU9Player"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ------------------- 创建图标占位 -------------------
          echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\" />" > android/app/src/main/res/mipmap-hdpi/ic_launcher.xml
          echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\" />" > android/app/src/main/res/mipmap-mdpi/ic_launcher.xml
          echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\" />" > android/app/src/main/res/mipmap-xhdpi/ic_launcher.xml
          echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\" />" > android/app/src/main/res/mipmap-xxhdpi/ic_launcher.xml
          echo "<adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\" />" > android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.xml

          # ------------------- 生成必要的 Gradle 构建脚本（修正 Kotlin 插件） -------------------
          echo "=== Creating Gradle scripts with Kotlin support ==="
          # 1) settings.gradle (位于 android/ 目录)
          cat > android/settings.gradle << 'EOF'
          rootProject.name = "ku9999"
          include ':app'
          EOF

          # 2) 根目录 build.gradle (位于 android/ 目录)
          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.1'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          # 3) app 模块 build.gradle (位于 android/app/)
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'

          android {
              namespace 'com.ku9.player'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.ku9.player'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }

              buildTypes {
                  debug {
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              // 如果需要，可取消注释以下 kotlinOptions 块
              // kotlinOptions {
              //     jvmTarget = '17'
              // }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
          }
          EOF

          # 创建空的 proguard-rules.pro (避免报错)
          touch android/app/proguard-rules.pro

          # ------------------- 验证文件结构 -------------------
          echo "=== Directory structure under android/ ==="
          find android -type f | sort

      - name: Build APK with Gradle
        id: build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"
          cd android
          
          # 打印项目结构（调试）
          echo "=== Available Gradle tasks ==="
          gradle tasks --no-daemon
          
          echo "=== Starting build ==="
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache 2>&1 | tee build.log
          BUILD_STATUS=$?
          
          echo "=== Full build log ==="
          cat build.log
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Gradle build failed with exit code $BUILD_STATUS"
            exit $BUILD_STATUS
          fi
          
          # 列出所有生成的 APK
          echo "=== Searching for generated APK files ==="
          APK_COUNT=$(find app/build -type f -name "*.apk" | wc -l)
          echo "Found $APK_COUNT APK(s):"
          find app/build -type f -name "*.apk" -ls
          
          if [ $APK_COUNT -eq 0 ]; then
            echo "ERROR: No APK was generated!"
            echo "Listing entire app/build directory:"
            find app/build -type f 2>/dev/null || echo "build directory not found"
            exit 1
          fi
          
          # 记录 APK 路径（用于上传）
          echo "apk_path=app/build/outputs/apk" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
