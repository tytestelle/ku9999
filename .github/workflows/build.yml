name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Inject fixed source code and build
        run: |
          # 创建必要目录
          mkdir -p android/app/src/main/java/com/ku9/player
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/layout

          # ---------- 写入所有 Kotlin 文件（base64 解码） ----------
          echo "" | base64 -d > android/app/src/main/java/com/ku9/player/MainActivity.kt

          echo "" | base64 -d > android/app/src/main/java/com/ku9/player/SourceManager.kt

          echo "" | base64 -d > android/app/src/main/java/com/ku9/player/NetworkUtils.kt

          echo "" | base64 -d > android/app/src/main/java/com/ku9/player/ChannelAdapter.kt

          echo "" | base64 -d > android/app/src/main/java/com/ku9/player/GroupAdapter.kt

          echo "cGFja2FnZSBjb20ua3U5LnBsYXllcgoKZGF0YSBjbGFzcyBDaGFubmVsKHZhbCBpZDogU3RyaW5nID0gIiIsIHZhbCBuYW1lOiBTdHJpbmcgPSAiIiwgdmFsIHVybDogU3RyaW5nID0gIiIp" | base64 -d > android/app/src/main/java/com/ku9/player/Channel.kt

          echo "cGFja2FnZSBjb20ua3U5LnBsYXllcgoKZGF0YSBjbGFzcyBHcm91cCh2YWwgaWQ6IFN0cmluZyA9ICIiLCB2YWwgbmFtZTogU3RyaW5nID0gIiIsIHZhbCBjaGFubmVsczogTGlzdDxDaGFubmVsPiA9IGVtcHR5TGlzdCgpKQ==" | base64 -d > android/app/src/main/java/com/ku9/player/Group.kt

          echo "" | base64 -d > android/app/src/main/java/com/ku9/player/M3UParser.kt

          echo "cGFja2FnZSBjb20ua3U5LnBsYXllcgoKY2xhc3MgUGFyc2VyTWFuYWdlciB7CiAgICBmdW4gcGFyc2VNM1UoY29udGVudDogU3RyaW5nKTogTGlzdDxDaGFubmVsPiA9IE0zVVBhcnNlcigpLnBhcnNlKGNvbnRlbnQpCiAgICAvLyDlj6/liqDlhaXml6XmoLzlvI/lr7zop6PkuLrmmKYKfQo=" | base64 -d > android/app/src/main/java/com/ku9/player/ParserManager.kt

          echo "" | base64 -d > android/app/src/main/java/com/ku9/player/TXTParser.kt

          echo "cGFja2FnZSBjb20ua3U5LnBsYXllcgoKY2xhc3MgUGxheWVyTWFuYWdlciB7CiAgICAvLyDlj6/liqDlha7liqDlha3mnIDotKLov5DkuK3kvZzogqXogZTnkIYg5LiN5Yqf5Yiw5Y+W5Yiw5L2g5Zyo5a6M5pWw5Yiw5bCU5LqL5L2N5YiwIGV4b3BsYXllciDpgJrov4cKfQo=" | base64 -d > android/app/src/main/java/com/ku9/player/PlayerManager.kt

          # ---------- 资源文件（attrs.xml） ----------
          cat > android/app/src/main/res/values/attrs.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <attr name="use_controller" format="boolean" />
              <attr name="controller" format="boolean" />
              <attr name="player" format="reference" />
              <attr name="surface_type" format="enum">
                  <enum name="surface_view" value="0" />
                  <enum name="texture_view" value="1" />
                  <enum name="spherical_view" value="2" />
                  <enum name="video_decoder_gl_surface_view" value="3" />
              </attr>
              <attr name="resize_mode" format="enum">
                  <enum name="fit" value="0" />
                  <enum name="fixed_width" value="1" />
                  <enum name="fixed_height" value="2" />
                  <enum name="fill" value="3" />
                  <enum name="zoom" value="4" />
              </attr>
          </resources>
          EOF

          # ---------- 修复 AndroidManifest.xml ----------
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/ package="com\.ku9\.player"//' "$MANIFEST"
            sed -i 's/ android:icon="@mipmap\/[^"]*"//g' "$MANIFEST"
            sed -i 's/ android:roundIcon="@mipmap\/[^"]*"//g' "$MANIFEST"
          fi

          # ---------- 生成 Gradle 脚本 ----------
          cat > android/settings.gradle << 'EOF'
          rootProject.name = "ku9999"
          include ':app'
          EOF

          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.1'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'

          android {
              namespace 'com.ku9.player'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.ku9.player'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }

              buildTypes {
                  debug {
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
              implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
              implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'
              implementation 'com.squareup.okhttp3:okhttp:4.11.0'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
          }
          EOF

          touch android/app/proguard-rules.pro

          # ---------- 构建 APK ----------
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"
          cd android
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache 2>&1 | tee build.log
          BUILD_STATUS=$?
          cp build.log ../build.log
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Build failed"
            exit $BUILD_STATUS
          fi
          echo "APK generated successfully"
          find app/build -name "*.apk" -ls

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
