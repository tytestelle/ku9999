name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      # 检查文件结构，帮助调试
      - name: List project structure
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== android/app/src/main/java/com/ku9/player ==="
          ls -la android/app/src/main/java/com/ku9/player || echo "Directory not found"
          echo "=== android/app/src/main/res/layout ==="
          ls -la android/app/src/main/res/layout || echo "Directory not found"

      - name: Build with full debug logs
        run: |
          cd android
          gradle assembleDebug --stacktrace --debug --no-daemon 2>&1 | tee build.log
          if [ $? -ne 0 ]; then
            echo "=== Last 500 lines of build.log ==="
            tail -n 500 build.log
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
