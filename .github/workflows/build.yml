name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Prepare source and resources
        run: |
          # 创建标准目录
          mkdir -p android/app/src/main/java/com/ku9/player
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values

          # 复制 MainActivity.kt
          if [ -f MainActivity.kt ]; then
            cp MainActivity.kt android/app/src/main/java/com/ku9/player/
          else
            echo "ERROR: MainActivity.kt not found in root!"
            exit 1
          fi

          # 复制布局文件
          if [ -f activity_main.xml ]; then
            cp activity_main.xml android/app/src/main/res/layout/
          else
            echo "ERROR: activity_main.xml not found in root!"
            exit 1
          fi

          # 复制其他必要的文件（如果有）
          [ -f item_channel.xml ] && cp item_channel.xml android/app/src/main/res/layout/
          [ -f item_group.xml ] && cp item_group.xml android/app/src/main/res/layout/

          # 复制 values 资源
          if [ -d values ]; then
            cp -r values/* android/app/src/main/res/values/
          else
            echo "WARNING: values directory not found in root, creating default colors/strings/themes"
            mkdir -p android/app/src/main/res/values
            echo '<resources><color name="colorPrimary">#3F51B5</color></resources>' > android/app/src/main/res/values/colors.xml
            echo '<resources><string name="app_name">KU9 Player</string></resources>' > android/app/src/main/res/values/strings.xml
            echo '<resources><style name="Theme.KU9Player" parent="Theme.AppCompat.Light.DarkActionBar" /></resources>' > android/app/src/main/res/values/themes.xml
          fi

          # 复制 AndroidManifest.xml
          if [ -f AndroidManifest.xml ]; then
            cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          else
            echo "ERROR: AndroidManifest.xml not found in root!"
            exit 1
          fi

          # 列出复制后的目录结构，以便调试
          echo "=== Files in android/app/src/main ==="
          find android/app/src/main -type f

      - name: Build with full logging
        run: |
          cd android
          gradle clean assembleDebug --stacktrace --no-daemon > build.log 2>&1
          if [ $? -ne 0 ]; then
            echo "=== Build failed, showing last 300 lines of build.log ==="
            tail -n 300 build.log
            exit 1
          else
            echo "=== Build succeeded ==="
          fi

      - name: Find APK
        run: |
          echo "=== Searching for APK ==="
          find android -name "*.apk" -type f
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
