name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prepare source, resources and Gradle scripts
        run: |
          # ------------------- 清理并创建目录 -------------------
          rm -rf android/app/src/main/java
          rm -rf android/app/src/main/res
          
          mkdir -p android/app/src/main/java/com/ku9/player
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values

          # ------------------- 递归复制所有 Kotlin 文件（扁平化） -------------------
          echo "=== Copying all Kotlin files (recursively) ==="
          find . -name "*.kt" ! -path "./android/*" -exec cp {} android/app/src/main/java/com/ku9/player/ \;

          # ------------------- 复制布局文件 -------------------
          echo "=== Copying layout files ==="
          for layout in activity_main.xml item_channel.xml item_group.xml; do
            if [ -f "$layout" ]; then
              cp "$layout" android/app/src/main/res/layout/
            fi
          done

          # ------------------- 创建资源文件 -------------------
          echo "=== Creating resource files ==="
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#3F51B5</color>
              <color name="colorPrimaryDark">#303F9F</color>
              <color name="colorAccent">#FF4081</color>
          </resources>
          EOF

          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">KU9 Player</string>
          </resources>
          EOF

          cat > android/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.KU9Player" parent="Theme.AppCompat.Light.DarkActionBar" />
          </resources>
          EOF

          cat > android/app/src/main/res/values/attrs.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <attr name="use_controller" format="boolean" />
              <attr name="controller" format="boolean" />
              <attr name="player" format="reference" />
              <attr name="surface_type" format="enum">
                  <enum name="surface_view" value="0" />
                  <enum name="texture_view" value="1" />
                  <enum name="spherical_view" value="2" />
                  <enum name="video_decoder_gl_surface_view" value="3" />
              </attr>
              <attr name="resize_mode" format="enum">
                  <enum name="fit" value="0" />
                  <enum name="fixed_width" value="1" />
                  <enum name="fixed_height" value="2" />
                  <enum name="fill" value="3" />
                  <enum name="zoom" value="4" />
              </attr>
          </resources>
          EOF

          # ------------------- 创建 AndroidManifest.xml -------------------
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.KU9Player"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ------------------- 自动修补 Kotlin 代码（关键修复） -------------------
          # 1. 在 MainActivity.kt 中添加缺失的 import 和 showToast 函数
          MAIN_ACTIVITY="android/app/src/main/java/com/ku9/player/MainActivity.kt"
          if [ -f "$MAIN_ACTIVITY" ]; then
            # 在文件顶部添加 import（如果不存在）
            grep -q "import android.widget.Toast" "$MAIN_ACTIVITY" || sed -i '1i import android.widget.Toast' "$MAIN_ACTIVITY"
            grep -q "import kotlinx.coroutines" "$MAIN_ACTIVITY" || sed -i '1i import kotlinx.coroutines.*' "$MAIN_ACTIVITY"
            grep -q "import kotlin.coroutines" "$MAIN_ACTIVITY" || sed -i '1i import kotlin.coroutines.*' "$MAIN_ACTIVITY"
            # 添加 showToast 扩展函数（在类外）
            if ! grep -q "fun.*showToast" "$MAIN_ACTIVITY"; then
              # 在 class 定义之前插入
              sed -i '/^class MainActivity/i \
              fun MainActivity.showToast(msg: String) {\
                  Toast.makeText(this, msg, Toast.LENGTH_SHORT).show()\
              }' "$MAIN_ACTIVITY"
            fi
          fi

          # 2. 处理 SourceManager 中的私有 setter 问题：将赋值改为使用公开方法（或临时改为 var）
          SOURCE_MANAGER="android/app/src/main/java/com/ku9/player/SourceManager.kt"
          if [ -f "$SOURCE_MANAGER" ]; then
            # 将 "channels = " 替换为 "setChannels(...)" 等，但更简单的是将 var 改为 public
            # 由于我们无法修改类定义，可以尝试将私有 setter 改为 public，但更简单：将赋值替换为使用内部方法
            # 临时方案：将所有 "channels = " 替换为 "// channels = "（注释掉）并添加一个 set 方法，但可能破坏逻辑
            # 这里我们仅添加一个警告，实际难以修复
            echo "WARNING: SourceManager.channels is private, build may still fail."
          fi

          # 3. 处理 NetworkUtils 中 okhttp 回调（需要正确实现接口）
          # 由于依赖已添加，但回调方法签名可能不对，无法自动修复

          # ------------------- 生成 Gradle 构建脚本（添加所有缺失依赖） -------------------
          echo "=== Creating Gradle scripts ==="
          cat > android/settings.gradle << 'EOF'
          rootProject.name = "ku9999"
          include ':app'
          EOF

          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.1'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'

          android {
              namespace 'com.ku9.player'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.ku9.player'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }

              buildTypes {
                  debug {
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
              // 添加缺失的依赖
              implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
              implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'
              implementation 'com.squareup.okhttp3:okhttp:4.11.0'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
          }
          EOF

          touch android/app/proguard-rules.pro

          # ------------------- 验证文件结构 -------------------
          echo "=== Directory structure under android/ ==="
          find android -type f | sort

      - name: Build APK with Gradle
        id: build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"
          cd android
          
          echo "=== Available Gradle tasks ==="
          gradle tasks --no-daemon
          
          echo "=== Starting build ==="
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache 2>&1 | tee build.log
          BUILD_STATUS=$?
          
          cp build.log ../build.log
          
          echo "=== Error summary ==="
          grep -A 30 "FAILURE" build.log || echo "No FAILURE pattern"
          echo "=== Last 200 lines ==="
          tail -n 200 build.log
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Gradle build failed with exit code $BUILD_STATUS"
            exit $BUILD_STATUS
          fi
          
          echo "=== Searching for APK ==="
          APK_COUNT=$(find app/build -type f -name "*.apk" | wc -l)
          echo "Found $APK_COUNT APK(s)"
          find app/build -type f -name "*.apk" -ls
          if [ $APK_COUNT -eq 0 ]; then
            echo "ERROR: No APK generated"
            find app/build -type f 2>/dev/null
            exit 1
          fi

      - name: Upload APK (if exists)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload full build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
