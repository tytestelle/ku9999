name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ============ 准备源代码（最小修改） ============
      - name: Prepare source code
        run: |
          # 清理并创建目录
          rm -rf android/app/src/main/java
          rm -rf android/app/src/main/res
          
          mkdir -p android/app/src/main/java/com/ku9/player
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values

          # 复制所有原始 Kotlin 文件（扁平化）
          find . -name "*.kt" ! -path "./android/*" -exec cp {} android/app/src/main/java/com/ku9/player/ \;

          # 统一包声明为 com.ku9.player（确保所有类在同一包下）
          find android/app/src/main/java -name "*.kt" -exec sed -i 's/^package .*/package com.ku9.player/' {} \;

          # 修正 NetworkUtils.kt 中的 code() 为 code
          sed -i 's/\.code()/.code/g' android/app/src/main/java/com/ku9/player/NetworkUtils.kt

          # 如果存在重复类定义的问题，可以删除冗余文件，但我们保留所有

          # ------------------- 资源文件（布局等） -------------------
          # 复制原始布局文件（如果存在）
          for layout in activity_main.xml item_channel.xml item_group.xml; do
            if [ -f "$layout" ]; then
              cp "$layout" android/app/src/main/res/layout/
            fi
          done

          # 如果没有布局，则创建简单占位（但您的仓库应该有）
          # 创建基本资源文件（覆盖，确保存在）
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#3F51B5</color>
              <color name="colorPrimaryDark">#303F9F</color>
              <color name="colorAccent">#FF4081</color>
          </resources>
          EOF

          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">KU9 Player</string>
          </resources>
          EOF

          cat > android/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.KU9Player" parent="Theme.AppCompat.Light.DarkActionBar" />
          </resources>
          EOF

          # 如果 attrs.xml 不存在，创建一个（可能被布局引用）
          if [ ! -f android/app/src/main/res/values/attrs.xml ]; then
            cat > android/app/src/main/res/values/attrs.xml << 'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <resources>
                <attr name="use_controller" format="boolean" />
                <attr name="controller" format="boolean" />
                <attr name="player" format="reference" />
                <attr name="surface_type" format="enum">
                    <enum name="surface_view" value="0" />
                    <enum name="texture_view" value="1" />
                    <enum name="spherical_view" value="2" />
                    <enum name="video_decoder_gl_surface_view" value="3" />
                </attr>
                <attr name="resize_mode" format="enum">
                    <enum name="fit" value="0" />
                    <enum name="fixed_width" value="1" />
                    <enum name="fixed_height" value="2" />
                    <enum name="fill" value="3" />
                    <enum name="zoom" value="4" />
                </attr>
            </resources>
            EOF
          fi

          # ------------------- AndroidManifest.xml（移除图标引用） -------------------
          # 如果原始有图标，则移除
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            sed -i 's/ android:icon="@mipmap\/[^"]*"//g' android/app/src/main/AndroidManifest.xml
            sed -i 's/ android:roundIcon="@mipmap\/[^"]*"//g' android/app/src/main/AndroidManifest.xml
            sed -i 's/ package="com\.ku9\.player"//g' android/app/src/main/AndroidManifest.xml
          else
            # 如果没有，创建最小版本
            cat > android/app/src/main/AndroidManifest.xml << 'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <manifest xmlns:android="http://schemas.android.com/apk/res/android">
                <uses-permission android:name="android.permission.INTERNET" />
                <application
                    android:allowBackup="true"
                    android:label="@string/app_name"
                    android:supportsRtl="true"
                    android:theme="@style/Theme.KU9Player"
                    android:usesCleartextTraffic="true">
                    <activity android:name=".MainActivity" android:exported="true">
                        <intent-filter>
                            <action android:name="android.intent.action.MAIN" />
                            <category android:name="android.intent.category.LAUNCHER" />
                        </intent-filter>
                    </activity>
                </application>
            </manifest>
            EOF
          fi

          # ------------------- Gradle 脚本 -------------------
          cat > android/settings.gradle << 'EOF'
          rootProject.name = "ku9999"
          include ':app'
          EOF

          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.1'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'

          android {
              namespace 'com.ku9.player'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.ku9.player'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }

              buildTypes {
                  debug {
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
              implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
              implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'
              implementation 'com.squareup.okhttp3:okhttp:4.11.0'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
              // 如果还需要其他库，请添加
          }
          EOF

          touch android/app/proguard-rules.pro

          echo "=== Source code prepared ==="
          find android -type f | sort

      # ============ 构建 APK ============
      - name: Build APK with Gradle
        id: build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"
          cd android
          
          echo "=== Starting build ==="
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache 2>&1 | tee build.log
          BUILD_STATUS=$?
          
          cp build.log ../build.log
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Gradle build failed with exit code $BUILD_STATUS"
            exit $BUILD_STATUS
          fi
          
          echo "=== Searching for APK ==="
          APK_COUNT=$(find app/build -type f -name "*.apk" | wc -l)
          echo "Found $APK_COUNT APK(s)"
          find app/build -type f -name "*.apk" -ls
          if [ $APK_COUNT -eq 0 ]; then
            echo "ERROR: No APK generated"
            find app/build -type f 2>/dev/null
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
