name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Copy source and resource files
        run: |
          mkdir -p android/app/src/main/java/com/ku9/player/manager
          mkdir -p android/app/src/main/java/com/ku9/player/utils
          mkdir -p android/app/src/main/java/com/ku9/player/data
          mkdir -p android/app/src/main/java/com/ku9/player/parser
          mkdir -p android/app/src/main/java/com/ku9/player/player
          mkdir -p android/app/src/main/java/com/ku9/player/ui
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values

          cp MainActivity.kt android/app/src/main/java/com/ku9/player/
          cp SourceManager.kt android/app/src/main/java/com/ku9/player/manager/ 2>/dev/null || true
          cp StorageManager.kt android/app/src/main/java/com/ku9/player/utils/ 2>/dev/null || true
          cp data/Channel.kt android/app/src/main/java/com/ku9/player/data/ 2>/dev/null || true
          cp data/EpgProgram.kt android/app/src/main/java/com/ku9/player/data/ 2>/dev/null || true
          cp parser/M3UParser.kt android/app/src/main/java/com/ku9/player/parser/ 2>/dev/null || true
          cp parser/TXTParser.kt android/app/src/main/java/com/ku9/player/parser/ 2>/dev/null || true
          cp parser/ParserManager.kt android/app/src/main/java/com/ku9/player/parser/ 2>/dev/null || true
          cp player/PlayerManager.kt android/app/src/main/java/com/ku9/player/player/ 2>/dev/null || true
          cp ui/ChannelAdapter.kt android/app/src/main/java/com/ku9/player/ui/ 2>/dev/null || true
          cp ui/GroupAdapter.kt android/app/src/main/java/com/ku9/player/ui/ 2>/dev/null || true
          cp utils/NetworkUtils.kt android/app/src/main/java/com/ku9/player/utils/ 2>/dev/null || true
          cp utils/Preferences.kt android/app/src/main/java/com/ku9/player/utils/ 2>/dev/null || true
          cp utils/ToastUtils.kt android/app/src/main/java/com/ku9/player/utils/ 2>/dev/null || true

          cp activity_main.xml android/app/src/main/res/layout/
          cp item_channel.xml android/app/src/main/res/layout/
          cp item_group.xml android/app/src/main/res/layout/

          if [ -d values ]; then
            cp -r values/* android/app/src/main/res/values/
          fi

          cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Verify file copy
        run: |
          echo "=== Checking MainActivity.kt ==="
          ls -l android/app/src/main/java/com/ku9/player/MainActivity.kt || echo "Missing MainActivity!"
          echo "=== Checking layout files ==="
          ls -l android/app/src/main/res/layout/

      - name: Build APK with full log
        run: |
          cd android
          # 将输出重定向到文件，并同时打印到控制台
          gradle assembleDebug --stacktrace --info --no-daemon 2>&1 | tee build.log
          # 如果失败，打印整个日志（但 tee 已经打印了所有内容，所以这里只作为备选）
          if [ $? -ne 0 ]; then
            echo "Build failed. Printing full log:"
            cat build.log
            exit 1
          fi

      - name: Upload APK if exists
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
