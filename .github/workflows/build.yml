name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Verify essential files
        run: |
          echo "=== Check root directory ==="
          ls -la
          echo "=== Check app/build.gradle ==="
          cat android/app/build.gradle

      - name: Build with full debug logs
        run: |
          cd android
          gradle clean assembleDebug --stacktrace --debug --no-daemon 2>&1 | tee build.log
          BUILD_STATUS=$?
          echo "=== Last 500 lines of build.log ==="
          tail -n 500 build.log
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Build failed with exit code $BUILD_STATUS"
            exit $BUILD_STATUS
          fi

      - name: List APK outputs
        run: |
          echo "=== Searching for APK ==="
          find android -name "*.apk" -type f || echo "No APK found"
          ls -la android/app/build/outputs/apk/debug/ || echo "Directory not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
