name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Copy source and resource files to standard locations
        run: |
          # 创建所有必要的目录（包括子目录）
          mkdir -p android/app/src/main/java/com/ku9/player/manager
          mkdir -p android/app/src/main/java/com/ku9/player/utils
          mkdir -p android/app/src/main/java/com/ku9/player/data
          mkdir -p android/app/src/main/java/com/ku9/player/parser
          mkdir -p android/app/src/main/java/com/ku9/player/player
          mkdir -p android/app/src/main/java/com/ku9/player/ui
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values

          # 复制 Kotlin 源文件（如果存在）
          [ -f MainActivity.kt ] && cp MainActivity.kt android/app/src/main/java/com/ku9/player/
          [ -f SourceManager.kt ] && cp SourceManager.kt android/app/src/main/java/com/ku9/player/manager/
          [ -f StorageManager.kt ] && cp StorageManager.kt android/app/src/main/java/com/ku9/player/utils/
          [ -f data/Channel.kt ] && cp data/Channel.kt android/app/src/main/java/com/ku9/player/data/
          [ -f data/EpgProgram.kt ] && cp data/EpgProgram.kt android/app/src/main/java/com/ku9/player/data/
          [ -f parser/M3UParser.kt ] && cp parser/M3UParser.kt android/app/src/main/java/com/ku9/player/parser/
          [ -f parser/TXTParser.kt ] && cp parser/TXTParser.kt android/app/src/main/java/com/ku9/player/parser/
          [ -f parser/ParserManager.kt ] && cp parser/ParserManager.kt android/app/src/main/java/com/ku9/player/parser/
          [ -f player/PlayerManager.kt ] && cp player/PlayerManager.kt android/app/src/main/java/com/ku9/player/player/
          [ -f ui/ChannelAdapter.kt ] && cp ui/ChannelAdapter.kt android/app/src/main/java/com/ku9/player/ui/
          [ -f ui/GroupAdapter.kt ] && cp ui/GroupAdapter.kt android/app/src/main/java/com/ku9/player/ui/
          [ -f utils/NetworkUtils.kt ] && cp utils/NetworkUtils.kt android/app/src/main/java/com/ku9/player/utils/
          [ -f utils/Preferences.kt ] && cp utils/Preferences.kt android/app/src/main/java/com/ku9/player/utils/
          [ -f utils/ToastUtils.kt ] && cp utils/ToastUtils.kt android/app/src/main/java/com/ku9/player/utils/

          # 复制布局文件
          [ -f activity_main.xml ] && cp activity_main.xml android/app/src/main/res/layout/
          [ -f item_channel.xml ] && cp item_channel.xml android/app/src/main/res/layout/
          [ -f item_group.xml ] && cp item_group.xml android/app/src/main/res/layout/

          # 复制 values 资源
          if [ -d values ]; then
            cp -r values/* android/app/src/main/res/values/
          fi

          # 复制 AndroidManifest.xml
          [ -f AndroidManifest.xml ] && cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml

          echo "File copy complete."

      - name: Build APK
        run: |
          cd android
          gradle assembleDebug --stacktrace --info --no-daemon

      - name: Find and upload APK
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
