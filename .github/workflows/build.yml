name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Copy source and resource files to standard locations
        run: |
          mkdir -p android/app/src/main/java/com/ku9/player/manager
          mkdir -p android/app/src/main/java/com/ku9/player/utils
          mkdir -p android/app/src/main/java/com/ku9/player/data
          mkdir -p android/app/src/main/java/com/ku9/player/parser
          mkdir -p android/app/src/main/java/com/ku9/player/player
          mkdir -p android/app/src/main/java/com/ku9/player/ui
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values

          # 复制根目录下的 .kt 文件（包括子目录）
          find . -name "*.kt" -not -path "./android/*" -exec cp --parents {} android/app/src/main/java/com/ku9/player/ \;
          # 复制布局文件
          cp activity_main.xml item_channel.xml item_group.xml android/app/src/main/res/layout/ 2>/dev/null || true
          # 复制 values
          cp -r values/* android/app/src/main/res/values/ 2>/dev/null || true
          # 复制 AndroidManifest
          cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml 2>/dev/null || true

      - name: Build APK
        run: |
          cd android
          gradle assembleDebug --stacktrace --info --no-daemon

      - name: List APK files
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f
          echo "=== Debug APK directory ==="
          ls -la android/app/build/outputs/apk/debug/ || echo "Directory not found"
          echo "=== Release APK directory ==="
          ls -la android/app/build/outputs/apk/release/ || echo "Directory not found"
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
