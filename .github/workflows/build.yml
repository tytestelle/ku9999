name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prepare resources and fix manifest
        run: |
          # 确保 attrs.xml 存在（避免属性引用错误）
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/attrs.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <attr name="use_controller" format="boolean" />
              <attr name="controller" format="boolean" />
              <attr name="player" format="reference" />
              <attr name="surface_type" format="enum">
                  <enum name="surface_view" value="0" />
                  <enum name="texture_view" value="1" />
                  <enum name="spherical_view" value="2" />
                  <enum name="video_decoder_gl_surface_view" value="3" />
              </attr>
              <attr name="resize_mode" format="enum">
                  <enum name="fit" value="0" />
                  <enum name="fixed_width" value="1" />
                  <enum name="fixed_height" value="2" />
                  <enum name="fill" value="3" />
                  <enum name="zoom" value="4" />
              </attr>
              <attr name="shutter_background_color" format="color" />
              <attr name="keep_content_on_player_reset" format="boolean" />
              <attr name="hide_during_ads" format="boolean" />
              <attr name="auto_show" format="boolean" />
              <attr name="show_timeout" format="integer" />
              <attr name="show_buffering" format="enum">
                  <enum name="never" value="0" />
                  <enum name="when_playing" value="1" />
                  <enum name="always" value="2" />
              </attr>
          </resources>
          EOF

          # 修复 AndroidManifest.xml（移除图标引用和 package 属性）
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/ package="com\.ku9\.player"//' "$MANIFEST"
            sed -i 's/ android:icon="@mipmap\/[^"]*"//g' "$MANIFEST"
            sed -i 's/ android:roundIcon="@mipmap\/[^"]*"//g' "$MANIFEST"
          fi

      - name: Build APK with Gradle
        id: build
        run: |
          # 下载并配置 Gradle 8.2
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"

          cd android
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache 2>&1 | tee build.log
          BUILD_STATUS=$?
          cp build.log ../build.log

          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Gradle build failed with exit code $BUILD_STATUS"
            exit $BUILD_STATUS
          fi

          echo "✅ Build successful"

          # 查找所有生成的 APK 文件（无论路径）
          cd ..
          mkdir -p apk_output
          find android -name "*.apk" -type f -exec cp {} apk_output/ \;
          APK_COUNT=$(ls -1 apk_output/*.apk 2>/dev/null | wc -l)
          echo "📦 Found $APK_COUNT APK file(s)"
          if [ $APK_COUNT -eq 0 ]; then
            echo "❌ No APK generated"
            exit 1
          fi
          ls -la apk_output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: apk_output/*.apk
          if-no-files-found: error

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
