name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Copy all sources to standard Android directories
        run: |
          # 确保目标目录存在
          mkdir -p android/app/src/main/java/com/ku9/player
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          # 复制主 Activity 和其他 .kt 文件（从根目录和子目录）
          cp -f MainActivity.kt android/app/src/main/java/com/ku9/player/ 2>/dev/null || echo "MainActivity.kt not found"
          # 复制子目录中的 .kt 文件（如果存在）
          for dir in data parser player ui utils; do
            if [ -d "$dir" ]; then
              mkdir -p android/app/src/main/java/com/ku9/player/$dir
              cp -f $dir/*.kt android/app/src/main/java/com/ku9/player/$dir/ 2>/dev/null || true
            fi
          done

          # 复制布局文件
          cp -f activity_main.xml android/app/src/main/res/layout/ 2>/dev/null || echo "activity_main.xml not found"
          cp -f item_channel.xml android/app/src/main/res/layout/ 2>/dev/null || true
          cp -f item_group.xml android/app/src/main/res/layout/ 2>/dev/null || true

          # 创建必要的资源文件
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#3F51B5</color>
              <color name="colorPrimaryDark">#303F9F</color>
              <color name="colorAccent">#FF4081</color>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">KU9 Player</string>
          </resources>
          EOF

          cat > android/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.KU9Player" parent="Theme.AppCompat.Light.DarkActionBar" />
          </resources>
          EOF

          # 复制 AndroidManifest.xml（如果根目录有，否则创建默认）
          if [ -f AndroidManifest.xml ]; then
            cp -f AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          else
            cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.ku9.player">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.KU9Player"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          fi

          # 创建 ic_launcher 占位（避免资源缺失）
          for d in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > android/app/src/main/res/mipmap-$d/ic_launcher.xml
            echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > android/app/src/main/res/mipmap-$d/ic_launcher_round.xml
          done

          echo "=== Files copied to standard locations ==="
          ls -la android/app/src/main/java/com/ku9/player/
          ls -la android/app/src/main/res/layout/
          ls -la android/app/src/main/res/values/

      - name: Build APK
        run: |
          cd android
          gradle clean assembleDebug --stacktrace --info --no-daemon

      - name: List APK
        run: |
          echo "=== Searching for APK ==="
          find android -name "*.apk" -type f || echo "No APK found"
          echo "=== Debug directory content ==="
          ls -la android/app/build/outputs/apk/debug/ || echo "Directory not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
