name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Auto-fix project structure and resources
        run: |
          echo "🔧 开始自动修复项目结构..."

          # 1. 创建目标目录
          mkdir -p android/app/src/main/java/com/ku9/player
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/menu

          # 2. 复制所有 Kotlin 文件到目标包路径（扁平化）
          echo "📦 复制 Kotlin 文件..."
          find . -name "*.kt" ! -path "./android/*" -exec cp {} android/app/src/main/java/com/ku9/player/ \;

          # 3. 补全 activity_main.xml
          cat > android/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical">
              <FrameLayout
                  android:id="@+id/fragment_container"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1" />
              <com.google.android.material.bottomnavigation.BottomNavigationView
                  android:id="@+id/bottom_navigation"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  app:menu="@menu/bottom_nav_menu" />
          </LinearLayout>
          EOF

          # 4. 补全 fragment_channel_list.xml
          cat > android/app/src/main/res/layout/fragment_channel_list.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical">
              <Spinner
                  android:id="@+id/spinner_groups"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content" />
              <androidx.appcompat.widget.SearchView
                  android:id="@+id/search_view"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:queryHint="搜索频道" />
              <androidx.recyclerview.widget.RecyclerView
                  android:id="@+id/rv_channels"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
          </LinearLayout>
          EOF

          # 5. 补全 item_channel.xml
          cat > android/app/src/main/res/layout/item_channel.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:padding="12dp"
              android:orientation="horizontal">
              <ImageView
                  android:id="@+id/iv_logo"
                  android:layout_width="40dp"
                  android:layout_height="40dp"
                  android:scaleType="centerCrop" />
              <TextView
                  android:id="@+id/tv_channel_name"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:layout_weight="1"
                  android:layout_marginStart="12dp"
                  android:textSize="16sp" />
              <ImageView
                  android:id="@+id/iv_favorite"
                  android:layout_width="24dp"
                  android:layout_height="24dp"
                  android:src="@android:drawable/star_off" />
          </LinearLayout>
          EOF

          # 6. 创建 bottom_nav_menu.xml
          cat > android/app/src/main/res/menu/bottom_nav_menu.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <menu xmlns:android="http://schemas.android.com/apk/res/android">
              <item
                  android:id="@+id/nav_channels"
                  android:icon="@android:drawable/ic_menu_view"
                  android:title="频道" />
              <item
                  android:id="@+id/nav_epg"
                  android:icon="@android:drawable/ic_menu_agenda"
                  android:title="节目单" />
              <item
                  android:id="@+id/nav_settings"
                  android:icon="@android:drawable/ic_menu_preferences"
                  android:title="设置" />
          </menu>
          EOF

          # 7. 创建 attrs.xml
          cat > android/app/src/main/res/values/attrs.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <attr name="use_controller" format="boolean" />
              <attr name="controller" format="boolean" />
              <attr name="player" format="reference" />
              <attr name="surface_type" format="enum">
                  <enum name="surface_view" value="0" />
                  <enum name="texture_view" value="1" />
                  <enum name="spherical_view" value="2" />
                  <enum name="video_decoder_gl_surface_view" value="3" />
              </attr>
              <attr name="resize_mode" format="enum">
                  <enum name="fit" value="0" />
                  <enum name="fixed_width" value="1" />
                  <enum name="fixed_height" value="2" />
                  <enum name="fill" value="3" />
                  <enum name="zoom" value="4" />
              </attr>
          </resources>
          EOF

          # 8. 修复 AndroidManifest.xml
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/ package="com\.ku9\.player"//' "$MANIFEST"
            sed -i 's/ android:icon="@mipmap\/[^"]*"//g' "$MANIFEST"
            sed -i 's/ android:roundIcon="@mipmap\/[^"]*"//g' "$MANIFEST"
            echo "✅ AndroidManifest.xml 已修复"
          fi

          # 9. 补充 strings.xml 和 colors.xml（如果缺失）
          if [ ! -f android/app/src/main/res/values/strings.xml ]; then
            cat > android/app/src/main/res/values/strings.xml << 'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <resources>
                <string name="app_name">KU9 Player</string>
            </resources>
            EOF
          fi

          if [ ! -f android/app/src/main/res/values/colors.xml ]; then
            cat > android/app/src/main/res/values/colors.xml << 'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <resources>
                <color name="colorPrimary">#3F51B5</color>
                <color name="colorPrimaryDark">#303F9F</color>
                <color name="colorAccent">#FF4081</color>
            </resources>
            EOF
          fi

          # 10. 创建 gradle.properties（启用 AndroidX）
          cat > android/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          echo "✅ 项目结构修复完成！"

      - name: Build APK with Gradle
        id: build
        run: |
          # 下载并配置 Gradle 8.2
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"

          cd android
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache 2>&1 | tee build.log
          BUILD_STATUS=$?
          cp build.log ../build.log

          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Gradle build failed with exit code $BUILD_STATUS"
            exit $BUILD_STATUS
          fi

          echo "✅ Build successful"

          # 查找 APK
          cd ..
          mkdir -p apk_output
          find android -name "*.apk" -type f -exec cp {} apk_output/ \;
          APK_COUNT=$(ls -1 apk_output/*.apk 2>/dev/null | wc -l)
          echo "📦 Found $APK_COUNT APK file(s)"
          if [ $APK_COUNT -eq 0 ]; then
            echo "❌ No APK generated"
            exit 1
          fi
          ls -la apk_output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: apk_output/*.apk
          if-no-files-found: error

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
