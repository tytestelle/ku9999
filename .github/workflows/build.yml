name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Fix gradle.properties and resources
        run: |
          echo "🔧 强制修复 gradle.properties 和资源文件..."
          
          # 1. 强制生成 gradle.properties（覆盖已有）
          cat > android/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
          echo "✅ gradle.properties 已生成"

          # 2. 确保资源文件存在
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/menu

          # themes.xml
          cat > android/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.KU9Player" parent="Theme.AppCompat.Light.DarkActionBar" />
          </resources>
          EOF

          # attrs.xml
          cat > android/app/src/main/res/values/attrs.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <attr name="use_controller" format="boolean" />
              <attr name="controller" format="boolean" />
              <attr name="player" format="reference" />
              <attr name="surface_type" format="enum">
                  <enum name="surface_view" value="0" />
                  <enum name="texture_view" value="1" />
                  <enum name="spherical_view" value="2" />
                  <enum name="video_decoder_gl_surface_view" value="3" />
              </attr>
              <attr name="resize_mode" format="enum">
                  <enum name="fit" value="0" />
                  <enum name="fixed_width" value="1" />
                  <enum name="fixed_height" value="2" />
                  <enum name="fill" value="3" />
                  <enum name="zoom" value="4" />
              </attr>
          </resources>
          EOF

          # strings.xml
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">KU9 Player</string>
          </resources>
          EOF

          # colors.xml
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#3F51B5</color>
              <color name="colorPrimaryDark">#303F9F</color>
              <color name="colorAccent">#FF4081</color>
          </resources>
          EOF

          # bottom_nav_menu.xml
          mkdir -p android/app/src/main/res/menu
          cat > android/app/src/main/res/menu/bottom_nav_menu.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <menu xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:id="@+id/nav_channels"
                  android:icon="@android:drawable/ic_menu_view"
                  android:title="频道" />
              <item android:id="@+id/nav_epg"
                  android:icon="@android:drawable/ic_menu_agenda"
                  android:title="节目单" />
              <item android:id="@+id/nav_settings"
                  android:icon="@android:drawable/ic_menu_preferences"
                  android:title="设置" />
          </menu>
          EOF

          # 3. 修复 AndroidManifest.xml（移除图标引用）
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            sed -i 's/ package="com\.ku9\.player"//' android/app/src/main/AndroidManifest.xml
            sed -i 's/ android:icon="@mipmap\/[^"]*"//g' android/app/src/main/AndroidManifest.xml
            sed -i 's/ android:roundIcon="@mipmap\/[^"]*"//g' android/app/src/main/AndroidManifest.xml
          fi

          echo "✅ 所有资源修复完成"

      - name: Build APK with Gradle
        id: build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"

          cd android
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache 2>&1 | tee build.log
          BUILD_STATUS=$?
          cp build.log ../build.log

          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ 构建失败，退出码: $BUILD_STATUS"
            exit $BUILD_STATUS
          fi

          echo "✅ 构建成功"
          cd ..
          mkdir -p apk_output
          find android -name "*.apk" -type f -exec cp {} apk_output/ \;
          APK_COUNT=$(ls -1 apk_output/*.apk 2>/dev/null | wc -l)
          echo "📦 找到 $APK_COUNT 个 APK 文件"
          if [ $APK_COUNT -eq 0 ]; then
            echo "❌ 没有生成 APK"
            exit 1
          fi
          ls -la apk_output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: apk_output/*.apk
          if-no-files-found: error

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
