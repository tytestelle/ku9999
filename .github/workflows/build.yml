name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Prepare Android project files
        run: |
          # 创建所有必要目录
          mkdir -p android/app/src/main/java/com/ku9/player/{manager,utils,data,parser,player,ui}
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values

          # 复制 Kotlin 文件（如果存在）
          [ -f MainActivity.kt ] && cp MainActivity.kt android/app/src/main/java/com/ku9/player/
          [ -f SourceManager.kt ] && cp SourceManager.kt android/app/src/main/java/com/ku9/player/manager/
          [ -f StorageManager.kt ] && cp StorageManager.kt android/app/src/main/java/com/ku9/player/utils/
          [ -f data/Channel.kt ] && cp data/Channel.kt android/app/src/main/java/com/ku9/player/data/
          [ -f data/EpgProgram.kt ] && cp data/EpgProgram.kt android/app/src/main/java/com/ku9/player/data/
          [ -f parser/M3UParser.kt ] && cp parser/M3UParser.kt android/app/src/main/java/com/ku9/player/parser/
          [ -f parser/TXTParser.kt ] && cp parser/TXTParser.kt android/app/src/main/java/com/ku9/player/parser/
          [ -f parser/ParserManager.kt ] && cp parser/ParserManager.kt android/app/src/main/java/com/ku9/player/parser/
          [ -f player/PlayerManager.kt ] && cp player/PlayerManager.kt android/app/src/main/java/com/ku9/player/player/
          [ -f ui/ChannelAdapter.kt ] && cp ui/ChannelAdapter.kt android/app/src/main/java/com/ku9/player/ui/
          [ -f ui/GroupAdapter.kt ] && cp ui/GroupAdapter.kt android/app/src/main/java/com/ku9/player/ui/
          [ -f utils/NetworkUtils.kt ] && cp utils/NetworkUtils.kt android/app/src/main/java/com/ku9/player/utils/
          [ -f utils/Preferences.kt ] && cp utils/Preferences.kt android/app/src/main/java/com/ku9/player/utils/
          [ -f utils/ToastUtils.kt ] && cp utils/ToastUtils.kt android/app/src/main/java/com/ku9/player/utils/

          # 复制布局文件
          [ -f activity_main.xml ] && cp activity_main.xml android/app/src/main/res/layout/
          [ -f item_channel.xml ] && cp item_channel.xml android/app/src/main/res/layout/
          [ -f item_group.xml ] && cp item_group.xml android/app/src/main/res/layout/

          # 复制 values 资源
          if [ -d values ]; then
            cp -r values/* android/app/src/main/res/values/
          else
            # 如果根目录没有 values 文件夹，创建默认资源文件
            mkdir -p android/app/src/main/res/values
            cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#3F51B5</color>
              <color name="colorPrimaryDark">#303F9F</color>
              <color name="colorAccent">#FF4081</color>
          </resources>
          EOF
            cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">KU9 Player</string>
          </resources>
          EOF
            cat > android/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.KU9Player" parent="Theme.AppCompat.Light.DarkActionBar" />
          </resources>
          EOF
          fi

          # 复制 AndroidManifest.xml（如果根目录有）
          if [ -f AndroidManifest.xml ]; then
            cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          else
            # 如果根目录没有，使用默认清单
            cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.ku9.player">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.KU9Player"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          fi

          echo "File preparation complete."

      - name: Build with full logs
        run: |
          cd android
          gradle assembleDebug --stacktrace --info --no-daemon 2>&1 | tee build.log
          if [ $? -ne 0 ]; then
            echo "=== Build failed, showing last 300 lines of log ==="
            tail -n 300 build.log
            exit 1
          fi

      - name: Find APK
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f || echo "No APK found."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
