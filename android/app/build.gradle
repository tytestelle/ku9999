plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.ku9.player'
    compileSdk 34

    defaultConfig {
        applicationId "com.ku9.player"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }

    // 关键：指定源码和资源路径为根目录
    sourceSets {
        main {
            java.srcDirs = [
                '../../src/main/java',  // 如果根目录下有 src/main/java 则用，否则用下面的
                '../../data',
                '../../parser',
                '../../player',
                '../../ui',
                '../../utils',
                '../../'  // 包含根目录下的 MainActivity.kt 等
            ]
            // 但根目录下没有 src/main/java，所以直接包含根目录
            // 但上面的路径会导致重复，我们可以直接指定根目录
            // 简化：指定根目录
            // 但注意，根目录下还有其他文件，可能会被当作源码编译（如 build.gradle 等），所以要小心
            // 更精确：只包含 .kt 文件所在的目录
            // 我们可以把所有 .kt 文件放在一个目录下，但现在是分散的，所以最好移动文件。
            // 鉴于时间，我们直接包含根目录，并在根目录下创建 res 目录
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'

    // ExoPlayer
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-hls:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-dash:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'

    // 网络请求
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.12.0'

    // Gson
    implementation 'com.google.code.gson:gson:2.10.1'

    // 协程
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
}
